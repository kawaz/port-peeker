name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::gofmt suggests changes"
            gofmt -d .
            exit 1
          fi

      - run: go vet ./...
      - run: go test ./... -race

      - name: Build linux/amd64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -o /dev/null ./cmd/port-peeker

      - name: Build linux/arm64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: go build -o /dev/null ./cmd/port-peeker
