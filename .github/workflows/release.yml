name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${TAG_NAME}" \
            -o "port-peeker-${GOOS}-${GOARCH}" \
            ./cmd/port-peeker

      - uses: actions/upload-artifact@v5
        with:
          name: port-peeker-${{ matrix.goos }}-${{ matrix.goarch }}
          path: port-peeker-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release create "$TAG_NAME" \
            --repo "$REPO" \
            --title "$TAG_NAME" \
            --generate-notes \
            port-peeker-linux-*
